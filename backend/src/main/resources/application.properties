# ================================================
# EventEase Backend Application Configuration
# ================================================

# Application Info
spring.application.name=event-ease-backend
server.port=20001

# Docker Compose Lifecycle Management
spring.docker.compose.lifecycle-management=start-and-stop

# ================================================
# Database Configuration
# ================================================

# MySQL Connection
#spring.datasource.url=jdbc:mysql://localhost:20000/event-ease-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=doan@251
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MSSQL Configuration
spring.datasource.url=jdbc:sqlserver://localhost:20000;databaseName=EventEase;encrypt=false;trustServerCertificate=true
spring.datasource.username=eventease_user
spring.datasource.password=Eventease@2025!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Alternative: Use SA account (for development only)
# spring.datasource.username=sa
# spring.datasource.password=Database@251


# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ================================================
# JPA / Hibernate Configuration
# ================================================

# Disable Hibernate auto DDL (Flyway handles schema)
spring.jpa.hibernate.ddl-auto=none

# Show SQL queries in console (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Open Session in View (for lazy loading in views)
spring.jpa.open-in-view=true

# ================================================
# Flyway Migration Configuration
# ================================================

# Enable Flyway for database migrations
spring.flyway.enabled=true

# Allow Flyway to baseline existing database
spring.flyway.baseline-on-migrate=true

# Migration scripts location - Using MSSQL specific migrations
spring.flyway.locations=classpath:db.migration.mssql

# Flyway table name
spring.flyway.table=flyway_schema_history

# Validate migrations on startup
spring.flyway.validate-on-migrate=true

# ================================================
# JWT Authentication Configuration
# ================================================

# JWT Secret Key (256-bit minimum for HS256)
jwt.secret=AxCNar8rxXyXcoboT1XWpSsgy/duovoyigZ52cVdVQgAxCNar8rxXyXcoboT1XWpSsgy/duovoyigZ52cVdVQg=

# JWT Token Expiration (24 hours in milliseconds)
jwt.expiration=86400000

# ================================================
# Google reCAPTCHA Configuration
# ================================================

# reCAPTCHA v2 Secret Key
recaptcha.secret=6Le3sR0sAAAAAO37DTieMwyPXBSlv_5nLcNAIDeg

# reCAPTCHA Verification URL
recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify

# ================================================
# Logging Configuration
# ================================================

# Root logging level
logging.level.root=INFO

# Package-specific logging
logging.level.org.minhtrinh.eventease251=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file configuration
logging.file.name=logs/event-ease-backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ================================================
# Server Configuration
# ================================================

# Server error handling
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
spring.web.error.include-exception=false

# ================================================
# Jackson JSON Configuration
# ================================================

# Date/Time format (automatically converts dates to string format)
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

# JSON serialization settings (using valid enum constants)
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.serialization.INDENT_OUTPUT=false

# ================================================
# File Upload Configuration (for event posters, logos)
# ================================================

# Max file size (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================================
# Profile-Specific Configuration
# ================================================

# Active profile (development, staging, production)
# Uncomment and set as needed:
# spring.profiles.active=development

# ================================================
# Notes:
# ================================================
# - Change jwt.secret in production (generate new 256-bit key)
# - Update recaptcha.secret with your actual Google reCAPTCHA key
# - Set logging.level.root=WARN in production
# - Disable spring.jpa.show-sql in production
# - Consider using environment variables for sensitive data
# ================================================

